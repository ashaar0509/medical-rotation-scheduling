name: med-rotation-scheduler
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      # Optimisation solver
      - ortools>=9.7
      # Data handling and Excel I/O
      - pandas>=2.0
      - openpyxl>=3.1
      # Web interface
      - streamlit>=1.28
      # Notebook environment
      - jupyter>=1.0
      - notebook>=7.0
      - ipywidgets>=8.0
      # Visualisation (used in notebook)
      - matplotlib>=3.7
      - seaborn>=0.13
